services:

  # ── Backend: FastAPI ──────────────────────────────────────────────
  backend:
    build: ./backend
    expose:
      - "8000"            # internal only, nginx proxies đến đây
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - app-network
    restart: unless-stopped

  # ── Nginx: serve frontend + proxy API ────────────────────────────
  nginx:
    image: nginx:alpine
    # Không expose port ra ngoài — cloudflared kết nối trực tiếp qua internal network
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ── Cloudflare Tunnel ─────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - nginx
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
